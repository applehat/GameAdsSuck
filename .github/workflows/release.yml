name: Release

on:
  release:
    types: [ published ]

permissions:
  contents: write   # Needed to upload assets to the release

jobs:
  build:
    name: Build and attach APK to release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Rename APK to include version tag
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/GameAdsSuck-${VERSION}.apk

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/GameAdsSuck-${{ github.event.release.tag_name }}.apk
